<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/AcademicFlow/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AcademicFlow - 学术工作流工具" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="manifest.json" />
    <!-- CSP：禁止内联脚本/eval，所有资源只从同域加载；样式允许内联以兼容编辑器注入；图片支持 base64/blob -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.github.com https://raw.githubusercontent.com https://api.siliconflow.cn https://mineru.net https://*.aliyuncs.com; font-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>AcademicFlow</title>
    <!--
      SPA on GitHub Pages 恢复脚本：
      与 public/404.html 配套。若 URL 是 /AcademicFlow/?/xxx 格式，
      解出真实路径 /AcademicFlow/xxx 并 replaceState，避免刷新 404。
      参考：https://github.com/rafgraph/spa-github-pages (MIT License)
    -->
    <script type="text/javascript" src="spa-recovery.js"></script>
    <script type="text/javascript" src="register-sw.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
